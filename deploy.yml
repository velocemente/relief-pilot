name: Deploy PilotBrief to GitHub Pages

# Triggers: every push to main, plus manual dispatch from the Actions tab.
# No build step — the app is a single-file PWA (index.html + sw.js + manifest.json).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Never cancel a running deployment;
# allow it to finish so the live site is never left in a broken state.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Upload the repo root as the Pages artifact.
      # Excludes OFP PDFs and dev-only files via .gitignore — only
      # index.html, sw.js, manifest.json, and icons/ go to production.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
